name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone go-gui
        run: git clone --depth 1 https://github.com/mike-ward/go-gui.git ../go-gui

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libfreetype6-dev libharfbuzz-dev libpango1.0-dev libfontconfig1-dev libhunspell-dev

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2
